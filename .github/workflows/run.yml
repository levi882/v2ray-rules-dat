name: Build Mihomo MRS rule sets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/run.yml"

permissions:
  contents: write

env:
  UPSTREAM_RELEASE_URL: https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set release variables
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"

      - name: Checkout MetaCubeX/meta-rules-converter
        uses: actions/checkout@v7
        with:
          repository: MetaCubeX/meta-rules-converter
          ref: 7dea27841a3579a633189830c98c08a0434e8b79
          path: converter

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./converter/go.mod
          cache-dependency-path: ./converter/go.sum

      - name: Download rule data from the original repository
        run: |
          mkdir -p upstream
          cd upstream || exit 1
          for file in geoip.dat geosite.dat geoip.dat.sha256sum geosite.dat.sha256sum; do
            curl -fL --retry 3 --retry-delay 2 \
              "${UPSTREAM_RELEASE_URL}/${file}" \
              -o "${file}"
          done
          sha256sum -c geoip.dat.sha256sum
          sha256sum -c geosite.dat.sha256sum

      - name: Build Mihomo MRS rule sets
        run: |
          cd converter || exit 1
          go run . geosite \
            -f ../upstream/geosite.dat \
            -o ../publish/mrs/geosite
          go run . geoip \
            -f ../upstream/geoip.dat \
            -o ../publish/mrs/geoip
          cd .. || exit 1

          find ./publish/mrs -type f ! -name '*.mrs' -delete
          find ./publish/mrs -type d -empty -delete

          install -p ./publish/mrs/geosite/cn.mrs ./publish/direct.mrs
          install -p ./publish/mrs/geosite/geolocation-\!cn.mrs ./publish/proxy.mrs
          install -p ./publish/mrs/geosite/category-ads-all.mrs ./publish/reject.mrs

          test -s ./publish/direct.mrs
          test -s ./publish/proxy.mrs
          test -s ./publish/reject.mrs
          test -n "$(find ./publish/mrs/geoip -type f -name '*.mrs' -print -quit)"

      - name: Package MRS rule sets
        run: |
          cd publish || exit 1
          zip -q -r rules-mrs.zip mrs direct.mrs proxy.mrs reject.mrs
          sha256sum direct.mrs proxy.mrs reject.mrs rules-mrs.zip > SHA256SUMS

      - name: Release and upload MRS assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          file: ./publish/*

      - name: Push MRS assets to the release branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: Purge jsDelivr CDN
        run: |
          for file in direct.mrs proxy.mrs reject.mrs rules-mrs.zip SHA256SUMS; do
            curl -fsS \
              "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done
